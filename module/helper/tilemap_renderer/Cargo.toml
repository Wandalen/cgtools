[package]
name = "tilemap_renderer"
version = "0.2.0"
edition = "2024"
authors = ["cgtools contributors"]
license = "MIT"
description = "Agnostic 2D rendering engine with backend adapter support"
repository = "https://github.com/Wandalen/cgtools"

[lints]
workspace = true

[features]
enabled = ["dep:error_tools", "dep:mod_interface", "dep:nohash-hasher"]
default = ["enabled"]
full = ["enabled", "adapter-svg", "adapter-terminal", "adapter-webgl", "cli"]
adapter-svg = ["enabled", "dep:base64"]
adapter-terminal = ["enabled"]
# Requires wasm32-unknown-unknown target.
adapter-webgl = [
  "enabled",
  "dep:minwebgl",
  "dep:web-sys",
  "dep:js-sys",
  "dep:wasm-bindgen",
  "dep:bytemuck"
]
# CLI stub — not yet reimplemented
cli = ["enabled"]

[dependencies]
nohash-hasher = { workspace = true, optional = true }
minwebgl = { workspace = true, optional = true }
web-sys = { workspace = true, optional = true }
js-sys = { workspace = true, optional = true }
wasm-bindgen = { workspace = true, optional = true }
base64 = { workspace = true, optional = true }
error_tools = { workspace = true, optional = true }
mod_interface = { workspace = true, optional = true }
bytemuck = { workspace = true, optional = true }

[dev-dependencies]
